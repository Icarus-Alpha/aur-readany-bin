name: Update AUR Package

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      latest: ${{ steps.version.outputs.latest }}
      current: ${{ steps.version.outputs.current }}
      changed: ${{ steps.version.outputs.changed }}
      asset_url: ${{ steps.version.outputs.asset_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Compare versions
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          RELEASE_JSON=$(mktemp)
          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            https://api.github.com/repos/codedogQBY/ReadAny/releases/latest \
            -o "$RELEASE_JSON"

          TAG_NAME=$(jq -er '.tag_name' "$RELEASE_JSON")
          LATEST=${TAG_NAME#v}
          CURRENT=$(grep '^pkgver=' PKGBUILD | cut -d= -f2)
          ASSET_URL=$(jq -er '
            .assets
            | map(select(.name | test("(amd64|x86_64).*\\.deb$")))
            | first
            | .browser_download_url
          ' "$RELEASE_JSON")

          echo "Debug: LATEST=$LATEST, CURRENT=$CURRENT"
          if [[ -z "$LATEST" || "$LATEST" == "null" ]]; then
            echo "ERROR: Failed to fetch latest version"
            exit 1
          fi
          if [[ -z "$ASSET_URL" || "$ASSET_URL" == "null" ]]; then
            echo "ERROR: Failed to locate amd64/x86_64 .deb asset in latest release"
            exit 1
          fi
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "asset_url=$ASSET_URL" >> $GITHUB_OUTPUT
          if [[ "$LATEST" != "$CURRENT" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Check Tauri major version
        run: |
          set -euo pipefail
          TAURI_VER=$(curl -s https://raw.githubusercontent.com/codedogQBY/ReadAny/main/packages/app/src-tauri/Cargo.toml \
            | grep '^tauri = ' | grep -oP '"[0-9]+' | tr -d '"')
          PKGBUILD_TAURI=$(grep -oP 'webkit2gtk-\K[0-9.]+' PKGBUILD | head -1 | cut -d. -f1)
          echo "Upstream Tauri major: $TAURI_VER, PKGBUILD webkit suffix implies Tauri: $PKGBUILD_TAURI"
          if [[ "$TAURI_VER" == "3" && "$PKGBUILD_TAURI" == "4" ]]; then
            gh issue create \
              --title "⚠️ Tauri major version changed: manual dependency review needed" \
              --body "Upstream Cargo.toml now references Tauri v3. The \`depends\` array in PKGBUILD may need updating. Please review against the new Tauri AUR documentation." \
              --label "maintenance" || true
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update:
    needs: check
    if: needs.check.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Update PKGBUILD
        run: |
          set -euo pipefail
          NEW_VER="${{ needs.check.outputs.latest }}"
          DEB_URL="${{ needs.check.outputs.asset_url }}"
          DEB_FILE=$(mktemp --suffix=.deb)

          curl -fsSL "$DEB_URL" -o "$DEB_FILE"
          SHA256=$(sha256sum "$DEB_FILE" | awk '{print $1}')

          sed -i "s/^pkgver=.*/pkgver=${NEW_VER}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          sed -i "s|^source_x86_64=.*|source_x86_64=(\"\${pkgname}-\${pkgver}.deb::${DEB_URL}\")|" PKGBUILD
          sed -i "s/sha256sums_x86_64=('.*')/sha256sums_x86_64=('${SHA256}')/" PKGBUILD

      - name: Generate .SRCINFO
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD:/pkg" archlinux:latest \
            bash -c "useradd -m builder && chown -R builder:builder /pkg && su builder -c 'cd /pkg && makepkg --printsrcinfo > .SRCINFO'"

      - name: Push to AUR
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${AUR_SSH_KEY}" ]]; then
            echo "ERROR: AUR_SSH_KEY is not configured"
            exit 1
          fi

          mkdir -p ~/.ssh
          echo "$AUR_SSH_KEY" > ~/.ssh/aur_key
          chmod 600 ~/.ssh/aur_key
          ssh-keyscan -H aur.archlinux.org >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<EOF
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur_key
            User aur
            IdentitiesOnly yes
          EOF

          git clone ssh://aur@aur.archlinux.org/readany-bin.git /tmp/aur
          cp PKGBUILD .SRCINFO /tmp/aur/
          cd /tmp/aur
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "No AUR changes to push"
          else
            git commit -m "Update to ${{ needs.check.outputs.latest }}"
            git push
          fi

      - name: Commit back to this repo
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "No repository changes to commit"
          else
            git commit -m "chore: update to ${{ needs.check.outputs.latest }}"
            git push
          fi
